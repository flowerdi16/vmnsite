<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ emp.name }}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

<!-- КНОПКА НАЗАД -->
<a href="/" class="back-btn">← Назад</a>

<div class="detail-container">

    <!-- ФОТО -->
    <div class="detail-photo">
        {% if emp.image %}
            <img src="{{ emp.image }}">
        {% else %}
            <div class="no-img big">Нет фото</div>
        {% endif %}
    </div>

    <!-- ИМЯ -->
    <h1 class="detail-name">{{ emp.name }}</h1>

    <!-- ПОЛНОЕ ОПИСАНИЕ -->
    <p class="detail-text">
        {{ emp.full_desc }}
    </p>

    {% if gallery %}

<h2 class="gallery-title">Фотографии</h2>

<div class="gallery-wrapper">

    <button class="gallery-btn"
            onclick="scrollGallery(-300)">
        ❮
    </button>

    <div class="gallery" id="gallery">

        {% for img in gallery %}
            <img
                src="{{ img.image_url }}"
                class="gallery-img"
                onclick="openImage('{{ img.image_url }}')"
            >
        {% endfor %}

    </div>

    <button class="gallery-btn"
            onclick="scrollGallery(300)">
        ❯
    </button>

</div>

{% endif %}
    
    <!-- ССЫЛКИ -->
    <div class="links">

        {% if links %}
            {% for link in links %}
                <a href="{{ link.url }}" target="_blank" class="link-btn">
                    {{ link.title }}
                </a>
            {% endfor %}
        {% else %}
            <p class="no-links">Ссылок пока нет</p>
        {% endif %}

    </div>

</div>

<div id="imageModal" class="image-modal">

    <span class="close-modal"
          onclick="closeImage()">
        ×
    </span>

    <img id="modalImage"
         class="modal-image">

</div>

<script>

function scrollGallery(amount){
    document.getElementById("gallery")
    .scrollBy({
        left: amount,
        behavior: "smooth"
    });
}

function openImage(src){
    document.getElementById("modalImage").src = src;
    document.getElementById("imageModal").style.display = "flex";
}

function closeImage(){
    document.getElementById("imageModal").style.display = "none";
}

</script>

</body>
</html>
